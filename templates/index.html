<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart URL | Professional Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes rotate { 100% { transform: rotate(1turn); } }
        .gradient-border {
            position: relative;
            z-index: 0;
            overflow: hidden;
            border-radius: 1.5rem;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            z-index: -2;
            left: -50%; top: -50%;
            width: 200%; height: 200%;
            background-repeat: no-repeat;
            background-size: 50% 50%, 50% 50%;
            background-position: 0 0, 100% 0, 100% 100%, 0 100%;
            background-image: linear-gradient(#3b82f6, #3b82f6), linear-gradient(#8b5cf6, #8b5cf6), linear-gradient(#3b82f6, #3b82f6), linear-gradient(#8b5cf6, #8b5cf6);
            animation: rotate 4s linear infinite;
        }
        .gradient-border::after {
            content: '';
            position: absolute;
            z-index: -1;
            left: 4px; top: 4px;
            width: calc(100% - 8px); height: calc(100% - 8px);
            background: #0f172a;
            border-radius: 1.3rem;
        }
    </style>
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-6 font-sans">

    <!-- Hero Card -->
    <div class="gradient-border p-8 w-full max-w-lg shadow-[0_0_50px_-12px_rgba(59,130,246,0.3)]">
        <div class="text-center mb-8">
            <span class="px-3 py-1 bg-blue-500/10 border border-blue-500/20 text-blue-400 rounded-full text-xs font-bold tracking-widest uppercase">Smart Core V1</span>
            <h1 class="text-4xl font-black mt-4 bg-clip-text text-transparent bg-gradient-to-br from-white to-slate-500">URL Shortener</h1>
            <p class="text-slate-400 mt-2 text-sm italic">Engineered for precision tracking.</p>
        </div>

        <div class="space-y-4">
            <input id="urlInput" type="url" placeholder="https://..." class="w-full bg-slate-950/50 border border-slate-800 p-4 rounded-xl focus:border-blue-500 outline-none transition-all duration-300 placeholder:text-slate-700">
            
            <button id="btn" onclick="shorten()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 py-4 rounded-xl font-bold transition-all duration-300 hover:shadow-[0_0_20px_rgba(59,130,246,0.4)] active:scale-95">
                Generate Secure Link
            </button>
        </div>

        <div id="resultBox" class="mt-8 p-6 bg-slate-900/30 rounded-2xl border border-slate-800 hidden">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-2">Shortened Endpoint</p>
            <div class="flex items-center justify-between">
                <p id="resultText" class="text-blue-400 font-mono text-lg font-medium"></p>
                <button onclick="copy()" class="p-2 hover:bg-slate-800 rounded-lg transition-colors"><svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg></button>
            </div>
        </div>

        <div class="mt-10 border-t border-slate-900 pt-6 text-center">
            <p class="text-slate-600 text-[10px] uppercase tracking-tighter">Developed by Erfan Ghannad Jafari</p>
        </div>
    </div>

    <script>
        async function shorten() {
            const btn = document.getElementById('btn');
            const resBox = document.getElementById('resultBox');
            const resText = document.getElementById('resultText');
            const url = document.getElementById('urlInput').value;
            
            if(!url) return;
            
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mx-auto" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>`;
            
            const response = await fetch(`/shorten?url=${encodeURIComponent(url)}`, { method: 'POST' });
            const data = await response.json();
            
            resText.innerText = data.short_url;
            resBox.classList.remove('hidden');
            btn.innerHTML = "Generate Secure Link";
        }
    </script>
</body>
</html>
